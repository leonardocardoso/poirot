name: Poirot
options:
  bundleIdPrefix: com.poirot-2
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "26.1"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"
  HighlightSwift:
    url: https://github.com/appstefan/HighlightSwift
    from: "1.1.0"
  swift-snapshot-testing:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.17.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor

targets:
  Poirot:
    type: application
    platform: macOS
    defaultLocalization: en
    sources:
      - path: Poirot/Sources
      - path: Poirot/Resources
    dependencies:
      - package: MarkdownUI
      - package: HighlightSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fyi.poirot-3
        PRODUCT_NAME: Poirot
        INFOPLIST_KEY_CFBundleDisplayName: Poirot
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        MARKETING_VERSION: "1.0.2"
        CURRENT_PROJECT_VERSION: 9
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_ENTITLEMENTS: Poirot/Resources/Poirot.entitlements
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2025 Leonardo Cardoso"
        ENABLE_USER_SCRIPT_SANDBOXING: false
        SWIFT_EMIT_LOC_STRINGS: true
        LOCALIZATION_PREFERS_STRING_CATALOGS: true
      configs:
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
          CODE_SIGN_STYLE: Manual
    postCompileScripts:
      - script: |
          export PATH="$PATH:/opt/homebrew/bin:/usr/local/bin"
          if which swiftlint > /dev/null; then
            swiftlint lint --config "${SRCROOT}/.swiftlint.yml" "${SRCROOT}/Poirot/Sources"
          else
            echo "warning: SwiftLint not installed"
          fi
        name: SwiftLint
        basedOnDependencyAnalysis: false

  PoirotTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: PoirotTests
        excludes:
          - "**/__Snapshots__/**"
    dependencies:
      - target: Poirot
      - package: swift-snapshot-testing
        product: SnapshotTesting
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Poirot.app/Contents/MacOS/Poirot"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: true

schemes:
  Poirot:
    build:
      targets:
        Poirot: all
        PoirotTests: [test]
    test:
      targets:
        - PoirotTests
