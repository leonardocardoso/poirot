name: Lumno
options:
  bundleIdPrefix: com.lumno
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "26.1"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  SwiftMockKit:
    url: https://github.com/leocardz/SwiftMockKit-mirror
    branch: main

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor

targets:
  Lumno:
    type: application
    platform: macOS
    defaultLocalization: en
    sources:
      - path: Lumno/Sources
      - path: Lumno/Resources
    dependencies:
      - package: SwiftMockKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lumno.app
        PRODUCT_NAME: Lumno
        INFOPLIST_KEY_CFBundleDisplayName: Lumno
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_ENTITLEMENTS: Lumno/Resources/Lumno.entitlements
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2025 Leonardo Cardoso"
        ENABLE_USER_SCRIPT_SANDBOXING: false
        SWIFT_EMIT_LOC_STRINGS: true
        LOCALIZATION_PREFERS_STRING_CATALOGS: true
    postCompileScripts:
      - script: |
          export PATH="$PATH:/opt/homebrew/bin:/usr/local/bin"
          if which swiftlint > /dev/null; then
            swiftlint lint --config "${SRCROOT}/.swiftlint.yml" "${SRCROOT}/Lumno/Sources"
          else
            echo "warning: SwiftLint not installed"
          fi
        name: SwiftLint
        basedOnDependencyAnalysis: false

  LumnoTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: LumnoTests
    dependencies:
      - target: Lumno
      - package: SwiftMockKit
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Lumno.app/Contents/MacOS/Lumno"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: true

schemes:
  Lumno:
    build:
      targets:
        Lumno: all
        LumnoTests: [test]
    test:
      targets:
        - LumnoTests
