name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    if: github.repository == 'leonardocardoso/poirot'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Prepare ExportOptions
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          sed -i '' "s/__TEAM_ID__/$APPLE_TEAM_ID/" ExportOptions.plist

      - name: Build Release
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild -scheme Poirot \
            -configuration Release \
            -destination 'platform=macOS' \
            -archivePath build/Poirot.xcarchive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            archive

      - name: Export App
        run: |
          xcodebuild -exportArchive \
            -archivePath build/Poirot.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Create DMG
        run: |
          mkdir -p build/dmg
          cp -r build/export/Poirot.app build/dmg/
          ln -s /Applications build/dmg/Applications
          hdiutil create -volname "Poirot" \
            -srcfolder build/dmg \
            -ov -format UDZO \
            build/Poirot-${GITHUB_REF_NAME}.dmg

      - name: Notarize DMG
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$APPLE_API_KEY_BASE64" | base64 --decode -o ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

          xcrun notarytool submit build/Poirot-${GITHUB_REF_NAME}.dmg \
            --key ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait --timeout 10m

      - name: Staple notarization ticket
        continue-on-error: true
        run: |
          for i in $(seq 1 10); do
            if xcrun stapler staple build/Poirot-${GITHUB_REF_NAME}.dmg; then
              echo "Stapled successfully on attempt $i"
              exit 0
            fi
            echo "Staple attempt $i/10 failed, waiting 30s for ticket propagation..."
            sleep 30
          done
          echo "Warning: stapling failed, DMG is still notarized (Gatekeeper checks online)"

      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 build/Poirot-${GITHUB_REF_NAME}.dmg | awk '{print $1}')
          echo "sha256=$SHA" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Poirot-${{ github.ref_name }}.dmg
          body: |
            ## Poirot ${{ github.ref_name }}

            ### Install via Homebrew
            ```bash
            brew tap leonardocardoso/poirot
            brew install --cask poirot
            ```

            ### Manual Download
            Download `Poirot-${{ github.ref_name }}.dmg`, open it, and drag Poirot to Applications.

            **SHA-256:** `${{ steps.sha.outputs.sha256 }}`
          draft: false
          prerelease: false

      - name: Update Homebrew Tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA="${{ steps.sha.outputs.sha256 }}"

          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/LeonardoCardoso/homebrew-poirot.git /tmp/tap
          cd /tmp/tap

          cat > Casks/poirot.rb << CASK
          cask "poirot" do
            version "${VERSION}"
            sha256 "${SHA}"

            url "https://github.com/LeonardoCardoso/poirot/releases/download/v#{version}/Poirot-v#{version}.dmg"
            name "Poirot"
            desc "Native macOS companion for Claude Code"
            homepage "https://github.com/LeonardoCardoso/poirot"

            depends_on macos: ">= :sequoia"

            app "Poirot.app"

            zap trash: [
              "~/Library/Preferences/com.leonardocardoso.Poirot.plist",
              "~/Library/Caches/com.leonardocardoso.Poirot",
            ]
          end
          CASK

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/poirot.rb
          git commit -m "Update Poirot to ${VERSION}"
          git push

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db || true
