name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths:
      - "Poirot/Sources/**/*.swift"
      - "PoirotTests/**/*.swift"
      - "project.yml"

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}

            ## macOS / Swift Review Focus

            This is a native macOS SwiftUI app (macOS 15.0+, Swift 6, Xcode 16+).
            Use the repository's CLAUDE.md for full project conventions.
            Pay special attention to these areas:

            ### Concurrency & Actor Isolation
            - Default actor isolation is `@MainActor` (project setting). No explicit annotations needed.
            - File I/O and heavy computation must be marked `nonisolated`.
            - Flag `@unchecked Sendable` without a documented safety invariant.
            - Flag unstructured `Task.detached` without clear justification.
            - Flag assumptions that state is unchanged after `await` (actor reentrancy).

            ### SwiftUI State & Performance
            - Must use `@Observable` with `@State` (not `ObservableObject` / `@StateObject`).
            - `@State` and `@StateObject` must be `private`.
            - Flag deprecated APIs: `foregroundColor()`, `cornerRadius()`, `NavigationView`, `onChange(of:) { value in }`.
            - Flag `AnyView` in list rows, inline filtering in `ForEach`, objects created in `body`.
            - Flag `GeometryReader` when `containerRelativeFrame()` or `visualEffect()` suffices.
            - Prefer `.animation(_:value:)` over the deprecated implicit form.

            ### SF Symbols
            - All icons must use SF Symbols (`Image(systemName:)`). No custom assets or emoji.
            - Size with `.font(.system(size:))`, never `.resizable().frame()`.
            - Animations must be gated behind `@Environment(\.accessibilityReduceMotion)`.
            - Flag indefinite symbol effects inside `List` / `LazyVStack` rows (expensive).

            ### macOS 26 Compatibility
            - Deployment target is macOS 15.0. APIs only on macOS 26+ (e.g. `.glassEffect`) must use `#available(macOS 26.0, *)` or the `GlassBackground` wrapper.
            - Flag any macOS 26-only API used without an availability check.

            ### Testing
            - Tests must use Swift Testing (`@Test`, `#expect`, `#require`), not XCTest.
            - Flag `@available` on suite types (only allowed on test functions).
            - Flag shared mutable state in test suites — prefer `struct` suites.

            ### Design System
            - All colors and spacing must come from `PoirotTheme`. Flag hardcoded colors or magic numbers.
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
