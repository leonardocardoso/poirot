name: Version Bump

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.2.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format. Use semver (e.g. 0.2.0)"
            exit 1
          fi

      - name: Read current build number
        id: current
        run: |
          BUILD=$(grep 'CURRENT_PROJECT_VERSION:' project.yml | sed 's/.*: //')
          echo "build=$BUILD" >> $GITHUB_OUTPUT

      - name: Update version in project.yml
        run: |
          sed -i "s/MARKETING_VERSION: \".*\"/MARKETING_VERSION: \"${{ inputs.version }}\"/" project.yml
          sed -i "s/CURRENT_PROJECT_VERSION: .*/CURRENT_PROJECT_VERSION: $(( ${{ steps.current.outputs.build }} + 1 ))/" project.yml

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Regenerate Xcode project
        run: xcodegen generate

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add project.yml Poirot.xcodeproj
          git commit -m "Bump version to ${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin main --tags
